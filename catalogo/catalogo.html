<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthurflix</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <div class="logo-wrap">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="6" fill="#1a1a1a"/>
                    <path d="M7 21 L14 7 L21 21" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M9.5 16 L18.5 16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-name">Arthur<span class="logo-accent">flix</span></span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="active">Início</a></li>
                    <li><a href="#">Séries</a></li>
                    <li><a href="#">Filmes</a></li>
                    <li><a href="#">Em Alta</a></li>
                    <li><a href="#">Minha Lista</a></li>
                </ul>
            </nav>
        </div>
        <div class="navbar-right">
            <i class="fas fa-search icon"></i>
            <a href="../index.html" class="kids-link" id="profile-name">Perfil</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">3</span>
            </div>
            <a href="../index.html" class="profile-menu" style="text-decoration: none; color: inherit;">
                <img class="profile-icon" id="profile-avatar" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <main class="sliders-container" id="main-content"></main>

    <footer>
        <div class="footer-content">
            <ul class="footer-links">
                <li><a href="#">Perguntas frequentes</a></li>
                <li><a href="#">Centro de ajuda</a></li>
                <li><a href="#">Conta</a></li>
                <li><a href="#">Termos de uso</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Preferências de cookies</a></li>
                <li><a href="#">Entre em contato</a></li>
                <li><a href="#">Avisos legais</a></li>
            </ul>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
