<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthurflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="click-screen">
        <div class="intro-logo-wrap">
            <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="6" fill="#1a1a1a"/>
                <path d="M7 21 L14 7 L21 21" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <path d="M9.5 16 L18.5 16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="intro-logo-text">Arthur<span style="color:#3b82f6">flix</span></span>
        </div>
        <p>Clique para entrar</p>
    </div>

    <div id="intro-screen">
        <div class="intro-logo-wrap">
            <svg width="64" height="64" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="6" fill="#1a1a1a"/>
                <path d="M7 21 L14 7 L21 21" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <path d="M9.5 16 L18.5 16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="intro-logo-text">Arthur<span style="color:#3b82f6">flix</span></span>
        </div>
    </div>

    <header>
        <div class="logo-wrap-main">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="6" fill="#1a1a1a"/>
                <path d="M7 21 L14 7 L21 21" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <path d="M9.5 16 L18.5 16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-name-main">Arthur<span class="logo-accent-main">flix</span></span>
        </div>
    </header>

    <main>
        <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
        <h1>Quem está assistindo?</h1>

        <ul class="profiles" aria-label="Perfis de usuário">
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="assets/perfil1.jpg" alt="Sonic do Filme">
                        <figcaption>Bianca</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="assets/perfil2.jpg" alt="Mulher de Bridgerton">
                        <figcaption>Amanda</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="assets/perfil3.jpg" alt="Geralt The Witcher">
                        <figcaption>Arthur</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="assets/perfil4.jpg" alt="Mario Bros">
                        <figcaption>Isaac</figcaption>
                    </figure>
                </a>
            </li>
        </ul>
        <button class="manage-btn">GERENCIAR PERFIS</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
