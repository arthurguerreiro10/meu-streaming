<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="click-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
        <p>Clique para entrar</p>
    </div>

    <div id="intro-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
    </div>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo">
    </header>
    <main>
        <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
        <h1>Quem está assistindo?</h1>

        <ul class="profiles" aria-label="Perfis de usuário">
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="/assets/perfil1.jpg" alt="Sonic do Filme">
                        <figcaption>Bianca</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="/assets/perfil2.jpg" alt="Mulher de Bridgerton">
                        <figcaption>Amanda</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="/assets/perfil3.jpg" alt="Geralt The Witcher">
                        <figcaption>Arthur</figcaption>
                    </figure>
                </a>
            </li>
            <li>
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="profile" tabindex="0">
                        <img src="/assets/perfil4.jpg" alt="Mario Bros">
                        <figcaption>Isaac</figcaption>
                    </figure>
                </a>
            </li>
        </ul>
        <button class="manage-btn">GERENCIAR PERFIS</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
